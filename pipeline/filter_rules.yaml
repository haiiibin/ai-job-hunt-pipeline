# 硬规则粗筛词库: /hunt Phase 2 Step 0 与 docs/scoring-rubric.md 评分前置使用。
# 设计借鉴(2026-07-04 调研): jolie-z/Auto-JobHunter 双漏斗(硬规则先行,零成本拦截,不给垃圾岗浪费 LLM 评分)
#   + Ocyss/boss-helper 过滤器清单(HR活跃度/猎头/去重) + loks666/get_jobs 黑名单机制。
# 三层优先级: safe_phrases(防误杀白名单,最高) > hard_veto(不入库) > flag(强制二档+标注)。
#
# 校准原则(与通用开源词库的关键差异,校招求职者视角):
#   - 校招/应届/XX届 是目标不是红线,绝不进否决词(开源库多为社招视角,直接抄会全军覆没)
#   - 外包/派遣 不硬杀,只 flag 归二档,由用户自判
#   - 默认不设薪资硬底线,可自行加;薪资问题只进 C 维度评分,不在此拦截

meta:
  created: 2026-07-04
  maintainer: edit to fit your own search; /hunt 自动使用, 词条增删由用户或经用户确认后修改

# 防误杀白名单: 文本命中这些短语时,短语内包含的否决/flag词不算命中
# (学 Auto-JobHunter: "非外包""拒绝外包"含"外包"二字,不处理会误杀好岗)
safe_phrases:
  - 非外包
  - 拒绝外包
  - 不接受外包
  - 无外包
  - 非外派
  - 非驻场
  - 非销售
  - 不涉及销售
  - 无销售性质
  - 非派遣

# 硬否决: 命中即不入库。每条拦截必须写进报告"过滤明细"(公司/岗位/命中词),可追溯可申诉
hard_veto:
  title:            # 岗位标题层(最严;注意"销售数据分析师"是数据岗,故不放裸词"销售")
    - 电销
    - 电话销售
    - 网销
    - 面销
    - 销售代表
    - 销售顾问
    - 销售专员
    - 保险销售
    - 地推
    - 兼职
    - 数据标注
    - 语音标注
    - 主播
    - 催收
  jd:               # JD 正文层(性质硬红线,出现即代表岗位本质是销售/灰产)
    - 无责任底薪
    - 销冠
    - 电话回访
    - 开拓客户资源

# 软标记: 命中不淘汰,强制归二档并在报告标注命中词,由用户自判(资格核验"两档呈现"原则不变)
flag:
  - 外包
  - 外派
  - 劳务派遣
  - 人力派遣
  - 驻场
  - 单休
  - 大小周
  - 六天工作制
  - 月休4天
  - 月休5天
  - 月休6天

# 幽灵岗位信号: 不拦截,命中计入 E 维度(红旗)扣分,报告标 ⚠️幽灵嫌疑
# (学 boss-helper activityFilter: HR活跃文本含"月/年"即视为死岗)
ghost_signals:
  - 发布超过30天仍在挂且无更新
  - 页面无明确申请入口
  - Boss渠道 HR 活跃度文本含"月"或"年"(如"3月内活跃""半年前活跃")
  - jobs.yaml 中 status=new 超过30天且 JD 无任何变化

# 公司黑名单: /hunt 扫描直接跳过(报告"过滤明细"列出)。
# 用户手动维护;明确拒绝且不想再见的公司挪入(学 get_jobs 黑名单库,但不自动学习,加名单须经用户确认)
blacklist:
  companies: []
